<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1080px; font-family:'Segoe UI', -apple-system, sans-serif; overflow:hidden; }
.card {
    width:1080px; height:1080px;
    background: linear-gradient(160deg, #071E45 0%, #0d2a5e 55%, #133A7A 100%);
    position:relative; display:flex; flex-direction:column; justify-content:center; padding:100px;
}
.card::before {
    content:''; position:absolute; top:-160px; right:-140px; width:560px; height:560px;
    background: radial-gradient(circle, rgba(215,154,33,0.22) 0%, transparent 70%);
}
.card::after {
    content:''; position:absolute; bottom:-180px; left:-140px; width:520px; height:520px;
    background: radial-gradient(circle, rgba(59,130,246,0.18) 0%, transparent 70%);
}
.brand { display:flex; align-items:center; gap:18px; margin-bottom:64px; position:relative; z-index:1; }
.mark { width:72px; height:72px; border-radius:18px; overflow:hidden; background:white; flex-shrink:0; }
.mark svg { width:100%; height:100%; display:block; }
.brand-name { font-size:34px; font-weight:800; color:white; letter-spacing:-0.5px; }
.brand-name .gold { color:#D79A21; }
h1 { font-size:68px; font-weight:800; color:white; line-height:1.14; letter-spacing:-1.5px; position:relative; z-index:1; }
h1 span { color:#7FB1FF; }
.sub { font-size:26px; color:rgba(255,255,255,0.68); margin-top:32px; line-height:1.6; max-width:820px; position:relative; z-index:1; }
.feature-list { margin-top:56px; display:flex; flex-direction:column; gap:18px; position:relative; z-index:1; }
.feature { display:flex; align-items:center; gap:16px; font-size:24px; color:white; font-weight:600; }
.dot { width:12px; height:12px; border-radius:50%; background:#D79A21; flex-shrink:0; }
.cta {
    margin-top:64px; display:inline-flex; align-items:center; gap:12px; background:#D79A21; color:#071E45;
    font-size:26px; font-weight:800; padding:20px 44px; border-radius:14px; width:fit-content; position:relative; z-index:1;
}
.footer-tag { position:absolute; bottom:48px; left:100px; font-size:20px; color:rgba(255,255,255,0.45); z-index:1; }
</style>
</head>
<body>
<div class="card">
    <div class="brand">
        <div class="mark">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                <rect width="512" height="512" rx="112" fill="#FFFFFF"/>
                <g transform="translate(32 32) scale(0.875)">
                    <path d="M264 70a186 186 0 1 0 0 372v-82a104 104 0 1 1 0-208V70Z" fill="#071E45"/>
                    <path d="M271 178a78 78 0 0 0 0 156V178Z" fill="#D79A21"/>
                    <circle cx="272" cy="256" r="30" fill="#FFFFFF"/>
                    <rect x="332" y="120" width="44" height="44" rx="7" fill="#F2C35B"/>
                    <rect x="389" y="172" width="35" height="35" rx="6" fill="#D79A21"/>
                    <rect x="330" y="234" width="42" height="42" rx="6" fill="#D79A21"/>
                    <rect x="399" y="267" width="30" height="30" rx="6" fill="#F2C35B"/>
                </g>
            </svg>
        </div>
        <div class="brand-name">Edu<span class="gold">Core</span></div>
    </div>
    <h1>Run your entire<br>school from <span>one<br>connected platform</span></h1>
    <p class="sub">Admissions, academics, fees, payroll &amp; staff HR — built for Nigerian schools.</p>
    <div class="feature-list">
        <div class="feature"><span class="dot"></span> Every feature included, no add-ons</div>
        <div class="feature"><span class="dot"></span> Mobile app for teachers &amp; staff</div>
        <div class="feature"><span class="dot"></span> Free for schools up to 20 students</div>
    </div>
    <div class="cta">Start Free Today →</div>
    <div class="footer-tag">educoreng.online</div>
</div>
</body>
</html>
