<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1200px; height:630px; font-family:'Segoe UI', -apple-system, sans-serif; overflow:hidden; }
.card {
    width:1200px; height:630px;
    background: linear-gradient(150deg, #071E45 0%, #0d2a5e 55%, #133A7A 100%);
    position:relative; display:flex; flex-direction:column; justify-content:center; padding:0 90px;
}
.card::before {
    content:''; position:absolute; top:-160px; right:-140px; width:560px; height:560px;
    background: radial-gradient(circle, rgba(215,154,33,0.22) 0%, transparent 70%);
}
.card::after {
    content:''; position:absolute; bottom:-180px; left:-120px; width:480px; height:480px;
    background: radial-gradient(circle, rgba(59,130,246,0.16) 0%, transparent 70%);
}
.brand { display:flex; align-items:center; gap:16px; margin-bottom:44px; position:relative; z-index:1; }
.mark { width:64px; height:64px; border-radius:16px; overflow:hidden; background:white; flex-shrink:0; }
.mark svg { width:100%; height:100%; display:block; }
.brand-name { font-size:30px; font-weight:800; color:white; letter-spacing:-0.5px; }
.brand-name .gold { color:#D79A21; }
h1 { font-size:56px; font-weight:800; color:white; line-height:1.15; letter-spacing:-1px; max-width:920px; position:relative; z-index:1; }
h1 span { color:#7FB1FF; }
p { font-size:22px; color:rgba(255,255,255,0.68); margin-top:22px; max-width:820px; position:relative; z-index:1; }
.badges { display:flex; gap:14px; margin-top:38px; position:relative; z-index:1; }
.badge { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18); color:white; font-size:16px; font-weight:600; padding:10px 20px; border-radius:10px; }
</style>
</head>
<body>
<div class="card">
    <div class="brand">
        <div class="mark">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                <rect width="512" height="512" rx="112" fill="#FFFFFF"/>
                <g transform="translate(32 32) scale(0.875)">
                    <path d="M264 70a186 186 0 1 0 0 372v-82a104 104 0 1 1 0-208V70Z" fill="#071E45"/>
                    <path d="M271 178a78 78 0 0 0 0 156V178Z" fill="#D79A21"/>
                    <circle cx="272" cy="256" r="30" fill="#FFFFFF"/>
                    <rect x="332" y="120" width="44" height="44" rx="7" fill="#F2C35B"/>
                    <rect x="389" y="172" width="35" height="35" rx="6" fill="#D79A21"/>
                    <rect x="330" y="234" width="42" height="42" rx="6" fill="#D79A21"/>
                    <rect x="399" y="267" width="30" height="30" rx="6" fill="#F2C35B"/>
                </g>
            </svg>
        </div>
        <div class="brand-name">Edu<span class="gold">Core</span></div>
    </div>
    <h1>Run your entire school<br>from <span>one connected platform</span></h1>
    <p>Admissions, academics, fees, payroll &amp; staff HR — built for Nigerian schools.</p>
    <div class="badges">
        <div class="badge">Every feature included</div>
        <div class="badge">Free up to 20 students</div>
    </div>
</div>
</body>
</html>
