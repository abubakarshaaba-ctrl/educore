; Forces PHP's opcache to check each file's modification time on every
; request instead of trusting a possibly-stale compiled cache. Without
; this, code changes only take effect after opcache is manually reset
; (some shared-hosting opcache_reset() calls from within a request don't
; reliably invalidate every PHP-FPM worker's cache), which was masking
; deploys until a manual cache clear.
;
; Small perf cost (one stat() per file per request) in exchange for
; deploys actually taking effect immediately. Takes effect after PHP's
; own user_ini.cache_ttl (default 300s) following the first deploy that
; ships this file — a one-time delay, not a recurring one.
opcache.validate_timestamps=1
opcache.revalidate_freq=0
